apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-app
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend-app

  template:
    metadata:
      labels:
        app: frontend-app

    spec:
      containers:
      - name: frontend-app
        image: 656853518128.dkr.ecr.us-east-1.amazonaws.com/drone-test

        imagePullPolicy: Always

        ports:
        - containerPort: 80